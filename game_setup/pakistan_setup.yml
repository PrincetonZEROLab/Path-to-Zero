## GAME SETUP 
# 1. Resource blocks are defined by the following parameters:
#   1a. Starting capacity (in MW)
#   1b. Build cost  (Input GW per build point for round)
#   1c. Backlash risk
# 2. Uncertainty parameters
# 3. Experience rate
# 4. Backlash rates
# 5. Scoring parameters

# game parameters
available_budget_tokens: 5
available_shaping_tokens: 2
available_build_tokens:
  - 10
  - 11
  - 12

stages:
  - 2035
  - 2050
  - 2065

# Resource names
resource_blocks:

  block_1:
    name: "ONSHORE WIND POWER"
    start_capacity: 0
    build_cost: 10
    backlash_risk: "high"
    EDG_data_name: "onshore_wind"
    new_resource: true

  block_2:
    name: "UTILITY-SCALE SOLAR PV"
    start_capacity: 0
    build_cost: 15
    backlash_risk: "moderate"
    EDG_data_name: "solar_pv"
    new_resource: true

  block_3:
    name: "LARGE-SCALE FIRM HYDRO"
    start_capacity: 0
    build_cost: 10
    backlash_risk: "high"
    EDG_data_name: "offshore_wind"
    new_resource: true

  block_4:
    name: "DISTRIBUTED SOLAR PV"
    start_capacity: 0
    build_cost: 8
    backlash_risk: "none"
    EDG_data_name: "distributed_solar"
    new_resource: true

  block_5:
    name: "BATTERY/PUMPED HYDRO"
    start_capacity: 0
    build_cost: 20
    backlash_risk: "none"
    EDG_data_name: "battery"
    new_resource: true

  block_6:
    name: "CLEAN FIRM RESOURCE"
    start_capacity: 0
    build_cost: 5
    backlash_risk: "low"
    EDG_data_name: "clean_firm"
    new_resource: true

  block_7:
    name: "DOMESTIC FOSSIL"
    start_capacity: 60
    build_cost: 20
    backlash_risk: "low"
    EDG_data_name: "existing_gas"
    new_resource: false

  block_8:
    name: "CONVENTIONAL NUCLEAR"
    start_capacity: 10
    build_cost: 10
    backlash_risk: "moderate"
    EDG_data_name: "existing_nuclear"
    new_resource: false

# Uncertainty parameters
uncertainty_parameters: 
  Demand_Variance: 0.05
  Disaster_Probability: 0.1
  Outage_Probability: 0.66
  Outage_Rate: 0.5

# Experience rate is decline in technology cost for each build point spent on each resource
experience_rate: 0.05

# Backlash rates are probability used in a Bernoulli distribution with one draw per build point spent on each resource (halved by Shaping points)  
backlash_rates:
  none: 0
  low: 0.1
  moderate: 0.17
  high: 0.25

# Scoring setup
scoring_parameters:
  Max_Points: 5
  Clean_Stage_1:
    - 60
    - 58
    - 56
    - 53
    - 50
  Clean_Stage_2:
    - 70
    - 68
    - 66
    - 63
    - 60
  Clean_Stage_3:
    - 99
    - 95
    - 90
    - 85
    - 80
  Reliability:
    - 99.0
    - 97.0
    - 95.0
    - 90.0
    - 80.0

